services:

  backend:
    build: ./backend
    container_name: smartchange_backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongo
    env_file:
      - .env
    volumes:
      - ./backend/app:/app   # Live code reload

  postgres:
    image: postgres:16-alpine
    container_name: smartchange_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartchange
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: smartchange_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: